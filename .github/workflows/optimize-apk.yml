name: Optimize APK
on:
  workflow_dispatch:
    inputs:
      apk_url:
        description: APK URL
        required: true

jobs:
  optimize-apk:
    runs-on: ubuntu-latest
    steps:
      - name: Download apk
        env:
          APK_URL: ${{ inputs.apk_url }}
        run: curl -sSL -o app.apk "$APK_URL"

      - name: Optimize apk
        run: zip -q -d app.apk "lib/armeabi-v7a/*" "lib/x86/*" "lib/x86_64/*"

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          archive: false
          path: app.apk
